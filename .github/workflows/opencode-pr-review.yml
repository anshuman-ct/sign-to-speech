name: OpenCode Professional PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run OpenCode PR Review
        uses: anomalyco/opencode/github@latest
        env:
          AZURE_RESOURCE_NAME: ${{ secrets.AZURE_RESOURCE_NAME }}
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: azure/gpt-5.4-nano
          use_github_token: true
          prompt: |
            Using the instructions in .opencode/skills/pr-code-review/SKILL.md, 
            perform a review on this PR: ${{ github.event.pull_request.html_url }} --comment