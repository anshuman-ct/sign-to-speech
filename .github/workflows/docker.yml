# .github/workflows/docker.yml
name: Docker Build & Scan

on:
  push:
    branches: [main, develop]
    paths:
      - 'Dockerfile'
      - 'src/**'
      - 'requirements.txt'
      - 'models/sign_language_cnn.h5'
      - '.python-version'
      - '.github/workflows/docker.yml'
      - '.dockerignore'
  pull_request:
    branches: [main, develop]
    paths:
      - 'Dockerfile'
      - 'src/**'
      - 'requirements.txt'
      - 'models/sign_language_cnn.h5'
      - '.python-version'
      - '.github/workflows/docker.yml'
      - '.dockerignore'

permissions:
  contents: read
  security-events: write
  actions: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_BUILDKIT: 1

jobs:
  docker-build:
    name: Build & Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Set up BuildKit for advanced features
      - uses: docker/setup-buildx-action@v3

      # Extract metadata for labels
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/sign-to-speech
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      # Build with cache (no push)
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: sign-to-speech:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.sha }}
            GIT_REVISION=${{ github.sha }}
            BUILD_DATE=${{ github.timestamp }}
            GITHUB_REPOSITORY=${{ github.repository }}

      # Scan the built image with Trivy (non-blocking in PR, blocking on main)
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sign-to-speech:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
        continue-on-error: ${{ github.event_name == 'pull_request' }}

      # Upload SARIF for GitHub Security tab integration
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: docker-scan

      # Generate SBOM
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: sign-to-speech:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      # Upload SBOM as artifact
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

      # Upload image as artifact for inspection
      - name: Save image as artifact
        run: |
          docker save sign-to-speech:${{ github.sha }} -o sign-to-speech.tar
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: docker-image
          path: sign-to-speech.tar
          retention-days: 7